services:
  - type: web
    name: mazal-rose
    runtime: node
    # Free plan for a preview deploy. NOTE: the free plan has NO persistent disk,
    # so admin-panel edits/uploads reset on restart/redeploy and the service sleeps
    # when idle. To make admin changes persist, switch `plan` to `starter` and
    # re-add the `MAZAL_DATA_DIR` env var + `disk` block (see render.starter.yaml).
    plan: free
    # --include=dev is required: NODE_ENV=production makes npm omit devDependencies,
    # but Next needs build-time devDeps (@tailwindcss/postcss, tailwindcss, typescript).
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
