services:
  - type: web
    name: mazal-rose
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: MAZAL_DATA_DIR
        value: /var/data/mazal
    disk:
      name: mazal-data
      mountPath: /var/data
      sizeGB: 1
