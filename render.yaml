services:
  - type: web
    name: mazal-rose
    runtime: node
    # Starter plan: always-on (no cold starts) + a persistent disk so admin
    # uploads/edits are stored on the server with NO operations limit.
    plan: starter
    # --include=dev is required: NODE_ENV=production makes npm omit devDependencies,
    # but Next needs build-time devDeps (@tailwindcss/postcss, tailwindcss, typescript).
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      # Store admin content + uploaded media on the mounted disk (below).
      - key: MAZAL_DATA_DIR
        value: /var/data/mazal
      # Optional email sending. Without RESEND_API_KEY, emails are saved as
      # queued events in the admin panel instead of being sent.
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: MAZAL <care@mazal.ae>
      - key: ADMIN_EMAIL
        sync: false
    disk:
      name: mazal-data
      mountPath: /var/data
      sizeGB: 1
